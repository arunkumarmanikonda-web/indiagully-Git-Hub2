      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done
        timeout-minutes: 2
      - name: Run P-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/p-round.spec.ts \
            --timeout=15000 --retries=1 --reporter=html
        continue-on-error: true
      - name: Verify P-Round score in health
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          with urllib.request.urlopen('http://localhost:3000/api/health') as r:
            d = json.load(r)
          assert d.get('version','') >= '2026.27', f'version too old: {d.get("version")}'
          assert d.get('routes_count',0) >= 252, f'routes low: {d.get("routes_count")}'
          sec = d.get('security', {})
          assert 'p_round' in sec, 'p_round missing from security block'
          fixes = d.get('p_round_fixes', [])
          assert len(fixes) >= 6, f'p_round_fixes too few: {len(fixes)}'
          print(f'✅ P-Round health gates passed — v{d["version"]} {d["routes_count"]} routes')
          EOF
      - name: Upload P-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-p-round-results
          path: playwright-report/
          retention-days: 7


  # ── Job 11: Playwright E2E — Q-Round Suite ───────────────────────────────────
  playwright-q-round:
    name: Playwright E2E Q-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done
        timeout-minutes: 2
      - name: Run Q-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/q-round.spec.ts \
            --timeout=15000 --retries=1 --reporter=html
        continue-on-error: true
      - name: Verify Q-Round score in health
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          with urllib.request.urlopen('http://localhost:3000/api/health') as r:
            d = json.load(r)
          assert d.get('version','') >= '2026.27', f'version too old: {d.get("version")}'
          assert d.get('routes_count',0) >= 252, f'routes low: {d.get("routes_count")}'
          sec = d.get('security', {})
          assert 'q_round' in sec, 'q_round missing from security block'
          fixes = d.get('q_round_fixes', [])
          assert len(fixes) >= 6, f'q_round_fixes too few: {len(fixes)}'
          print(f'✅ Q-Round health gates passed — v{d["version"]} {d["routes_count"]} routes')
          EOF
      - name: Upload Q-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-q-round-results
          path: playwright-report/
          retention-days: 7


  # ── Job 12: Playwright E2E — R-Round Suite ───────────────────────────────────
  playwright-r-round:
    name: Playwright E2E R-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done
        timeout-minutes: 2
      - name: Run R-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/r-round.spec.ts \
            --timeout=15000 --retries=1 --reporter=html
        continue-on-error: true
      - name: Verify R-Round score in health
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          with urllib.request.urlopen('http://localhost:3000/api/health') as r:
            d = json.load(r)
          assert d.get('version','') >= '2026.27', f'version too old: {d.get("version")}'
          assert d.get('routes_count',0) >= 252, f'routes low: {d.get("routes_count")}'
          sec = d.get('security', {})
          assert 'r_round' in sec, 'r_round missing from security block'
          fixes = d.get('r_round_fixes', [])
          assert len(fixes) >= 6, f'r_round_fixes too few: {len(fixes)}'
          print(f'✅ R-Round health gates passed — v{d["version"]} {d["routes_count"]} routes')
          EOF
      - name: Upload R-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-r-round-results
          path: playwright-report/
          retention-days: 7


  # ── Job 13: Playwright E2E — S-Round Suite ───────────────────────────────────
  playwright-s-round:
    name: Playwright E2E S-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
