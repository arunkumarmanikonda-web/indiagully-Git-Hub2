        continue-on-error: true
      - name: Verify S-Round score in health
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          with urllib.request.urlopen('http://localhost:3000/api/health') as r:
            d = json.load(r)
          assert d.get('version','') >= '2026.27', f'version too old: {d.get("version")}'
          assert d.get('routes_count',0) >= 252, f'routes low: {d.get("routes_count")}'
          sec = d.get('security', {})
          assert 's_round' in sec, 's_round missing from security block'
          fixes = d.get('s_round_fixes', [])
          assert len(fixes) >= 6, f's_round_fixes too few: {len(fixes)}'
          print(f'✅ S-Round health gates passed — v{d["version"]} {d["routes_count"]} routes')
          EOF
      - name: Upload S-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-s-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 8: D1 Migration (on tag push) ────────────────────────────────────

  playwright-t-round:
    name: Playwright E2E T-Round
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.run_e2e != 'false' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Start Wrangler dev server
