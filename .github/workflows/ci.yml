          for i in {1..30}; do curl -sf http://localhost:3000/api/health && break || sleep 2; done
      - name: Run GG-Round Playwright tests
        run: npx playwright test tests/gg-round.spec.ts --timeout=15000 --retries=1 --reporter=html
      - name: GG-Round health gate
        run: |
          python3 -c "
          import urllib.request, json
          d = json.loads(urllib.request.urlopen('http://localhost:3000/api/health').read())
          assert d.get('version','') >= '2026.31', f'version too old: {d.get(\"version\")}'
          assert d.get('routes_count',0) >= 276, f'routes too few: {d.get(\"routes_count\")}'
          assert 'gg_round' in str(d.get('security',{})), 'gg_round block missing'
          assert len(d.get('gg_round_fixes',[])) >= 6, 'gg_round_fixes < 6'
          print(f'GG-Round gate PASSED - v{d[\"version\"]} {d[\"routes_count\"]} routes')
          "
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gg-round-test-results
          path: playwright-report/

  d1-migrate:
    name: D1 Production Migration
    runs-on: ubuntu-latest
    needs: [deploy]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations to production..."
          npx wrangler d1 migrations apply india-gully-production || {
            echo "⚠  D1 migrations failed — token may lack D1:Edit permission."
            echo "Run: bash scripts/create-d1-remote.sh"
            exit 0
          }
          echo "✅ D1 migrations applied."
        continue-on-error: true
