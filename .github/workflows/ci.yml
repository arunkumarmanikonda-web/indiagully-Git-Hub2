name: CI – Build, Lint, E2E & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run Playwright E2E tests'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Build & Type-Check ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 2: Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect hard-coded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check for exposed credentials in source
        run: |
          echo "=== Scanning for credential patterns ==="
          if grep -rn --include="*.ts" --include="*.tsx" \
            -E "(password|passwd|secret|api_key|apikey)\s*[:=]\s*['\"][^'\"]{6,}" \
            src/ | grep -v "placeholder\|XXXX\|your-\|demo-hash\|TODO\|P1 TODO\|production\|comment\|//"; then
            echo "WARNING: Potential credential exposure detected in source files."
            echo "Review findings above. CI will not fail on first pass."
          else
            echo "No obvious credential patterns found."
          fi

  # ── Job 3: Playwright E2E — Regression Suite ─────────────────────────────
  playwright-regression:
    name: Playwright Regression (I-Round)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          echo "Waiting for server to start..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'
          echo "Server is ready."

      - name: Run regression tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/regression.spec.ts \
            --reporter=list \
            --timeout=20000 \
            --retries=2
        continue-on-error: true

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-regression-results
          path: playwright-report/
          retention-days: 7

  # ── Job 4: Playwright E2E — K-Round Suite ────────────────────────────────
  playwright-k-round:
    name: Playwright E2E K-Round
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'
          echo "Server ready."

      - name: Run K-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/k-round.spec.ts \
            --reporter=list \
            --timeout=20000 \
            --retries=2
        continue-on-error: true

      - name: Upload K-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-k-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 5: Playwright E2E — L-Round Suite ────────────────────────────────
  playwright-l-round:
    name: Playwright E2E L-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'
          echo "Server ready."

      - name: Run L-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/l-round.spec.ts \
            --reporter=list \
            --timeout=20000 \
            --retries=2
        continue-on-error: true

      - name: Upload L-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-l-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 6: Playwright E2E — M-Round Suite ────────────────────────────────
  playwright-m-round:
    name: Playwright E2E M-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event.inputs.run_e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'
          echo "Server ready."

      - name: Run M-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/m-round.spec.ts \
            --reporter=list \
            --timeout=20000 \
            --retries=2
        continue-on-error: true

      - name: Upload M-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-m-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 7: Deploy to Cloudflare Pages (main branch only) ──────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name india-gully

      - name: Smoke test production
        run: |
          sleep 15
          echo "=== Health Check ==="
          curl -sf https://india-gully.pages.dev/api/health | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('  version:', d.get('version'))
          print('  routes:', d.get('routes_count'))
          sc=d.get('security_score',{})
          print('  m_round:', sc.get('m_round'))
          assert d.get('version','') >= '2026.27', f'version too old: {d.get(\"version\")}'
          assert d.get('routes_count',0) >= 222, f'route count low: {d.get(\"routes_count\")}'
          print('  ✅ Health check passed')
          "
          echo "=== Public Endpoints ==="
          curl -sf -o /dev/null -w "  homepage: %{http_code}\n" https://india-gully.pages.dev/
          curl -sf -o /dev/null -w "  listings: %{http_code}\n" https://india-gully.pages.dev/api/listings
          curl -sf -o /dev/null -w "  insights: %{http_code}\n" https://india-gully.pages.dev/api/insights
          curl -sf -o /dev/null -w "  audit:    %{http_code}\n" https://india-gully.pages.dev/audit
          echo "=== Auth Guards ==="
          curl -sf -o /dev/null -w "  /api/mandates guard: %{http_code}\n" https://india-gully.pages.dev/api/mandates
          curl -sf -o /dev/null -w "  /api/dpdp/dpo/dashboard guard: %{http_code}\n" https://india-gully.pages.dev/api/dpdp/dpo/dashboard
          echo "=== DPDP v2 ==="
          curl -sf -X POST https://india-gully.pages.dev/api/dpdp/consent/withdraw \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"ci-test@indiagully.com","purposes":["analytics"]}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('withdrawal_ref','').startswith('WD-'), 'WD- ref missing'; print('  ✅ DPDP withdraw OK:', d.get('withdrawal_ref'))"
          echo "=== DPDP Banner v3 ==="
          curl -sf -X POST https://india-gully.pages.dev/api/dpdp/consent/record \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"ci-test@indiagully.com","analytics":true,"marketing":false,"third_party":false}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success'), 'consent/record failed'; print('  ✅ DPDP consent/record OK')"
          echo "All smoke tests passed ✅"

  # ── Job 7: Playwright E2E — N-Round Suite ────────────────────────────────────
  playwright-n-round:
    name: Playwright E2E N-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done
        timeout-minutes: 2

      - name: Run N-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/n-round.spec.ts \
            --timeout=15000 --retries=1 --reporter=html
        continue-on-error: true

      - name: Upload N-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-n-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 9: Playwright E2E — O-Round Suite ────────────────────────────────────
  playwright-o-round:
    name: Playwright E2E O-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start Wrangler dev server
        run: |
          npx wrangler pages dev dist --ip 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done
        timeout-minutes: 2

      - name: Run O-Round E2E tests
        run: |
          BASE_URL=http://localhost:3000 npx playwright test tests/o-round.spec.ts \
            --timeout=15000 --retries=1 --reporter=html
        continue-on-error: true

      - name: Verify O-Round score in health
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          with urllib.request.urlopen('http://localhost:3000/api/health') as r:
            d = json.load(r)
          assert d.get('version','') >= '2026.27', f'version too old: {d.get("version")}'
          assert d.get('routes_count',0) >= 252, f'routes low: {d.get("routes_count")}'
          sec = d.get('security', {})
          assert 'o_round' in sec, 'o_round missing from security block'
          fixes = d.get('o_round_fixes', [])
          assert len(fixes) >= 6, f'o_round_fixes too few: {len(fixes)}'
          print('✅ O-Round health gates passed')
          print(f'  version={d["version"]} routes={d["routes_count"]} o_round_fixes={len(fixes)}')
          EOF

      - name: Upload O-Round test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-o-round-results
          path: playwright-report/
          retention-days: 7

  # ── Job 10: Playwright E2E — P-Round Suite ───────────────────────────────────
  playwright-p-round:
    name: Playwright E2E P-Round
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.run_e2e != 'false'
